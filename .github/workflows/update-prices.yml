name: Actualizare zilnica preturi

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC, zilnic
  workflow_dispatch: {} # permite rulare manuala din tab-ul Actions

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instaleaza dependinte
        run: npm ci

      - name: Ruleaza update de preturi
        run: npm run update-prices
        continue-on-error: true

      - name: Commit modificari (daca exista)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/products.json update-report.json
          git diff --staged --quiet || git commit -m "chore: actualizare automata preturi $(date -u +%Y-%m-%d)"
          git push

      - name: Esueaza job-ul daca prea multe erori (dupa ce s-a salvat ce a mers)
        if: always()
        run: |
          if [ -f update-report.json ]; then
            node -e "
              const r = require('./update-report.json');
              const total = r.ok + r.failed;
              if (total > 0 && r.failed / total > 0.1) {
                console.error('ATENTIE: ' + r.failed + '/' + total + ' esuate (peste 10%). Verifica selectoarele sau blocarea IP.');
                process.exit(1);
              }
            "
          fi
